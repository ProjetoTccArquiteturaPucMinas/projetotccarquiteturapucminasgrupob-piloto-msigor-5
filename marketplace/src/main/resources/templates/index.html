<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marketplace</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<h1>Marketplace de Acessórios</h1>

<form id="cart-form">
    <table>
        <thead>
        <tr>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Quantidade</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.getNome()}"></td>
            <td th:text="${product.getCategoriaProduto()}"></td>
            <td th:text="${product.getPreco()}"></td>
            <td>
                <input type="number" min="0"
                       th:attr="data-id=${product.getId()}"
                       class="quantity"/>
            </td>
        </tr>
        </tbody>
    </table>

    <button type="submit">Calcular</button>
</form>

<h2>Resumo</h2>
<div id="result">
    <p>Subtotal: <span id="subtotal">0</span></p>
    <p>Desconto: <span id="discount">0</span></p>
    <p>Total: <span id="total">0</span></p>
</div>

<script src="/js/app.js"></script>
</body>
</html>
